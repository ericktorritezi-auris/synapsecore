<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Análise Estrutural — Synapse Core</title>
<meta name="theme-color" content="#0B132B">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<link rel="icon" href="/favicon.ico">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<title>Timeline Evolutiva — Synapse Core</title>
<style>
:root{--bg:#0B132B;--sf:#1C2541;--s2:rgba(28,37,65,.75);--ac:#D4AF7F;--adim:rgba(212,175,127,.1);--abrd:rgba(212,175,127,.25);--tx:#F5F7FA;--mu:#C9D1D9;--dim:rgba(201,209,217,.4);--brd:rgba(201,209,217,.1);--fd:'Satoshi',sans-serif;--fb:'Inter',sans-serif;--r:12px;--sw:260px;--th:60px;--violet:#7c3aed;--vdim:rgba(124,58,237,.1);--vbrd:rgba(124,58,237,.25)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--fb);background:var(--bg);color:var(--tx);min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;height:calc(var(--th) + env(safe-area-inset-top,0px));padding:env(safe-area-inset-top,0px) 16px 0;background:var(--sf);border-bottom:1px solid var(--brd);position:fixed;top:0;left:0;right:0;z-index:50}
.topbar img{height:28px}
.hamburger{background:none;border:none;color:var(--mu);cursor:pointer;padding:8px;border-radius:8px;font-size:20px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:40;backdrop-filter:blur(2px)}
.overlay.open{display:block}
.sidebar{width:var(--sw);background:var(--sf);border-right:1px solid var(--brd);position:fixed;top:0;left:0;bottom:0;z-index:45;display:flex;flex-direction:column;transform:translateX(-100%);transition:transform .3s cubic-bezier(.4,0,.2,1);overflow-y:auto}
.sidebar.open{transform:translateX(0)}
.sb-logo{padding:20px 20px 18px;border-bottom:1px solid var(--brd)}
.sb-logo img{height:32px}
.sb-nav{flex:1;padding:12px 10px;overflow-y:auto;scrollbar-width:none}.sb-nav::-webkit-scrollbar{display:none}
.nav-section{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);padding:14px 10px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;color:var(--mu);font-size:13.5px;text-decoration:none;transition:all .18s;margin-bottom:1px;border:1px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.04);color:var(--tx)}
.nav-item.active{background:var(--adim);color:var(--ac);border-color:var(--abrd)}
.nav-item .ni{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.sb-footer{padding:14px 12px;border-top:1px solid var(--brd)}
.user-pill{display:flex;align-items:center;gap:10px;padding:10px;background:rgba(11,19,43,.5);border-radius:10px;border:1px solid var(--brd)}
.user-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--ac),#b8924e);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:12px;font-weight:700;color:var(--bg);flex-shrink:0}
.user-name{font-size:12.5px;font-weight:500}
.user-role{font-size:10px;color:var(--dim)}
.logout-btn{margin-left:auto;background:none;border:none;color:var(--dim);cursor:pointer;font-size:13px;padding:4px 6px}
.main{padding:calc(var(--th)+16px+env(safe-area-inset-top,0px)) 16px 60px}
/* Header */
.page-header{margin-bottom:16px}
.page-header-top{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.back-btn{background:none;border:none;color:var(--dim);cursor:pointer;font-size:13px;padding:4px 0;display:flex;align-items:center;gap:4px}
.pat-nome{font-family:var(--fd);font-size:20px;font-weight:700}
.pat-sub{font-size:12px;color:var(--dim)}
/* Tabs */
.tabs{display:flex;gap:4px;overflow-x:auto;padding-bottom:2px;margin-bottom:20px;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 16px;border-radius:20px;font-family:var(--fd);font-size:12.5px;font-weight:700;cursor:pointer;border:1px solid var(--brd);color:var(--dim);background:transparent;white-space:nowrap;transition:all .2s}
.tab:hover{color:var(--mu);border-color:rgba(255,255,255,.15)}
.tab.active{background:var(--adim);color:var(--ac);border-color:var(--abrd)}
.tab-panel{display:none}
.tab-panel.active{display:block}
/* Btn */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:9px;font-family:var(--fd);font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .2s;text-decoration:none}
.btn-primary{background:linear-gradient(135deg,var(--ac),#b8924e);color:var(--bg)}
.btn-ghost{background:var(--adim);color:var(--ac);border:1px solid var(--abrd)}
.btn-violet{background:var(--vdim);color:#c4b5fd;border:1px solid var(--vbrd)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn:disabled{opacity:.5;cursor:not-allowed}
/* Cards */
.sec{background:var(--s2);border:1px solid var(--brd);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
.sec-accent::before{content:'';display:block;height:2px;background:linear-gradient(90deg,var(--ac),transparent)}
.sec-violet::before{content:'';display:block;height:2px;background:linear-gradient(90deg,#7c3aed,transparent)}
.sec-green::before{content:'';display:block;height:2px;background:linear-gradient(90deg,#10b981,transparent)}
.sec-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.sec-title{font-family:var(--fd);font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px}
.sec-arrow{font-size:11px;color:var(--dim);transition:transform .2s}
.sec.open .sec-arrow{transform:rotate(-180deg)}
.sec-body{display:none;padding:14px 16px;border-top:1px solid var(--brd)}
.sec.open .sec-body{display:block}
/* Field */
.field-label{font-size:10.5px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px}
.field-value{font-size:13px;color:var(--mu);line-height:1.65}
.field-block{margin-bottom:14px}
/* Tags */
.tag{display:inline-block;font-size:11.5px;padding:3px 10px;border-radius:20px;font-weight:600;margin:2px}
.tag-gold{background:rgba(212,175,127,.1);color:var(--ac);border:1px solid rgba(212,175,127,.2)}
.tag-green{background:rgba(16,185,129,.1);color:#6ee7b7;border:1px solid rgba(16,185,129,.2)}
.tag-red{background:rgba(239,68,68,.08);color:#fca5a5;border:1px solid rgba(239,68,68,.15)}
.tag-blue{background:rgba(59,130,246,.08);color:#93c5fd;border:1px solid rgba(59,130,246,.15)}
.tag-violet{background:rgba(124,58,237,.1);color:#c4b5fd;border:1px solid rgba(124,58,237,.2)}
/* Hipóteses */
.hip-card{background:rgba(11,19,43,.5);border:1px solid var(--brd);border-radius:10px;padding:14px;margin-bottom:10px}
.hip-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px}
.hip-tipo{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;padding:2px 8px;border-radius:10px}
.hip-confianca{font-family:var(--fd);font-size:18px;font-weight:900;color:var(--ac);white-space:nowrap}
.hip-texto{font-size:13.5px;color:var(--tx);line-height:1.65;font-weight:500;margin-bottom:10px}
.hip-ev-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.hip-perguntas{background:rgba(212,175,127,.04);border:1px solid rgba(212,175,127,.1);border-radius:8px;padding:10px 12px;margin-top:8px}
.hip-edit{background:rgba(11,19,43,.6);border:1px solid var(--brd);border-radius:8px;padding:12px;margin-top:10px}
.hip-edit textarea{width:100%;background:rgba(11,19,43,.5);border:1px solid var(--brd);border-radius:6px;color:var(--tx);font-family:var(--fb);font-size:12.5px;padding:8px 10px;outline:none;resize:vertical;min-height:52px;line-height:1.5}
.status-sel{background:rgba(11,19,43,.6);border:1px solid var(--brd);border-radius:6px;color:var(--tx);font-family:var(--fb);font-size:12.5px;padding:7px 10px;outline:none;width:100%;margin-bottom:8px}
/* Identidade */
.id-card{border-radius:10px;padding:14px;margin-bottom:10px;border:1px solid rgba(255,255,255,.06)}
.id-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.id-value{font-size:13px;line-height:1.65}
.frase-id{background:linear-gradient(135deg,rgba(212,175,127,.08),rgba(212,175,127,.03));border:1px solid var(--abrd);border-radius:10px;padding:14px 16px;margin-bottom:16px;font-family:var(--fd);font-size:15px;font-weight:700;color:var(--ac);line-height:1.5;font-style:italic;text-align:center}
/* Visão geral */
.vg-card{background:rgba(11,19,43,.4);border:1px solid var(--brd);border-radius:10px;padding:14px;margin-bottom:10px}
.vg-titulo{font-family:var(--fd);font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.vg-texto{font-size:13px;color:var(--mu);line-height:1.6}
/* Spin */
.mini-spin{width:14px;height:14px;border:2px solid var(--adim);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-row{display:flex;align-items:center;gap:8px;padding:16px 0;color:var(--dim);font-size:13px}
/* History */
.hist-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--brd);font-size:12.5px;color:var(--mu)}
.hist-item:last-child{border-bottom:none}
/* Alerta */
.alerta-box{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.2);border-radius:8px;padding:9px 12px;font-size:12px;color:#fcd34d;margin-bottom:12px}
/* Footer */
.page-footer{text-align:center;padding:20px 0 8px;font-size:10px;color:var(--dim)}
.page-footer strong{color:rgba(201,209,217,.4)}
@media(min-width:960px){
  .topbar{display:none}.overlay{display:none!important}.sidebar{transform:translateX(0)}
  .main{margin-left:var(--sw);padding-top:32px;padding-left:32px;padding-right:32px}
}
@media(min-width:600px){.main{padding-left:24px;padding-right:24px}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
.sidebar::-webkit-scrollbar{display:none}.sidebar{scrollbar-width:none}</style>
<style>
/* ── TIMELINE ESPECÍFICO ── */
.pac-nav-bar{background:var(--sf);border-bottom:1px solid var(--brd);padding:0 16px;overflow-x:auto;white-space:nowrap}
.pac-nav-bar::-webkit-scrollbar{display:none}

.score-hero{background:linear-gradient(135deg,var(--adim),rgba(212,175,127,.03));border:1px solid var(--abrd);border-radius:var(--r);padding:18px;margin-bottom:14px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.score-main{}
.score-lbl{font-family:var(--fd);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(212,175,127,.55);margin-bottom:3px}
.score-val{font-family:var(--fd);font-size:48px;font-weight:900;color:var(--ac);line-height:1;letter-spacing:-1px}
.score-delta{font-family:var(--fd);font-size:12px;font-weight:700;margin-top:3px}
.score-delta.up{color:#6ee7b7}.score-delta.down{color:#fca5a5}.score-delta.same{color:var(--dim)}
.score-dims{flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:7px;min-width:200px}
.dim-item{display:flex;flex-direction:column;gap:2px}
.dim-lbl{font-family:var(--fd);font-size:8px;letter-spacing:.8px;text-transform:uppercase;color:var(--dim)}
.dim-bar-bg{height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.dim-bar{height:100%;border-radius:2px;background:linear-gradient(90deg,#C4965A,var(--ac))}
.dim-val{font-family:var(--fd);font-size:10px;font-weight:700;color:var(--mu)}

.chart-card{background:var(--sf);border:1px solid var(--brd);border-radius:var(--r);padding:14px 18px;margin-bottom:14px}
.chart-hdr{font-family:var(--fd);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:10px;display:flex;justify-content:space-between}
.chart-area{height:70px;overflow:hidden}
.chart-svg{width:100%;height:100%;overflow:visible}

.gen-banner{background:rgba(212,175,127,.06);border:1px solid var(--abrd);border-radius:9px;padding:10px 14px;display:flex;align-items:center;gap:9px;margin-bottom:14px;font-family:var(--fd);font-size:11.5px;letter-spacing:.3px;color:rgba(212,175,127,.7)}
.gen-spinner{width:14px;height:14px;flex-shrink:0;border:2px solid rgba(212,175,127,.2);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite}
.ok-banner{background:rgba(16,185,129,.05);border:1px solid rgba(16,185,129,.18);border-radius:9px;padding:9px 14px;display:flex;align-items:center;gap:7px;margin-bottom:14px;font-family:var(--fd);font-size:11px;letter-spacing:.5px;color:rgba(16,185,129,.65)}
@keyframes spin{to{transform:rotate(360deg)}}

/* Feed vertical */
.feed{position:relative;padding-left:26px}
.feed::before{content:'';position:absolute;left:9px;top:0;bottom:0;width:1px;background:linear-gradient(to bottom,transparent,var(--brd) 5%,var(--brd) 95%,transparent)}

.phase-divider{position:relative;margin:20px 0 12px -26px;padding:9px 13px;background:var(--adim);border:1px solid rgba(212,175,127,.15);border-radius:9px;display:flex;align-items:center;gap:9px}
.phase-divider::before{content:'';position:absolute;left:-1px;top:50%;transform:translateY(-50%);width:3px;height:55%;background:var(--ac);border-radius:0 2px 2px 0}
.phase-icon{font-size:13px;flex-shrink:0}
.phase-name{font-family:var(--fd);font-size:14px;font-weight:700;color:var(--ac);line-height:1.2}
.phase-period{font-family:var(--fd);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin-top:1px}

.ev{position:relative;margin-bottom:10px;opacity:0;transform:translateX(-6px);animation:evIn .3s ease forwards}
@keyframes evIn{to{opacity:1;transform:translateX(0)}}
.ev:nth-child(1){animation-delay:.04s}.ev:nth-child(2){animation-delay:.08s}.ev:nth-child(3){animation-delay:.12s}
.ev:nth-child(4){animation-delay:.16s}.ev:nth-child(5){animation-delay:.20s}.ev:nth-child(6){animation-delay:.24s}
.ev:nth-child(7){animation-delay:.28s}.ev:nth-child(8){animation-delay:.32s}.ev:nth-child(9){animation-delay:.36s}
.ev:nth-child(10){animation-delay:.40s}

.ev-dot{position:absolute;left:-21px;top:13px;width:10px;height:10px;border-radius:50%;border:2px solid var(--bg);z-index:1}
.ev-dot.sessao{background:rgba(59,130,246,.8)}.ev-dot.mapeamento{background:rgba(212,175,127,.9)}
.ev-dot.documento{background:rgba(139,92,246,.8)}.ev-dot.cid{background:rgba(16,185,129,.8)}
.ev-dot.flag{background:rgba(239,68,68,.9)}.ev-dot.marco{background:var(--ac);box-shadow:0 0 7px rgba(212,175,127,.5)}
.ev-dot.score-up{background:#10b981}.ev-dot.score-down{background:#ef4444}

.ev-card{background:var(--sf);border:1px solid var(--brd);border-radius:10px;padding:11px 13px;cursor:pointer;transition:all .18s}
.ev-card:hover{border-color:rgba(212,175,127,.2);background:var(--s2);transform:translateX(2px)}
.ev-card.expanded{border-color:var(--abrd)}
.ev-card.t-flag{border-color:rgba(239,68,68,.2);background:rgba(239,68,68,.04)}
.ev-card.t-marco{border-color:rgba(212,175,127,.25);background:var(--adim)}
.ev-card.t-sup{border-color:rgba(16,185,129,.2);background:rgba(16,185,129,.03)}
.ev-card.t-sdown{border-color:rgba(239,68,68,.2);background:rgba(239,68,68,.03)}

.ev-top{display:flex;align-items:center;gap:9px;margin-bottom:5px}
.ev-badge{font-family:var(--fd);font-size:9px;letter-spacing:1.2px;text-transform:uppercase;padding:2px 7px;border-radius:9px;flex-shrink:0}
.b-sessao{background:rgba(59,130,246,.1);color:#93c5fd;border:1px solid rgba(59,130,246,.2)}
.b-mapa{background:var(--adim);color:var(--ac);border:1px solid var(--abrd)}
.b-doc{background:rgba(139,92,246,.1);color:#c4b5fd;border:1px solid rgba(139,92,246,.2)}
.b-cid{background:rgba(16,185,129,.1);color:#6ee7b7;border:1px solid rgba(16,185,129,.2)}
.b-flag{background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.2)}
.b-marco{background:var(--adim);color:var(--ac);border:1px solid var(--abrd)}
.ev-date{font-family:var(--fd);font-size:10px;letter-spacing:.8px;color:var(--dim);margin-left:auto;flex-shrink:0}
.ev-title{font-family:var(--fd);font-size:13px;font-weight:700;color:var(--tx);letter-spacing:.2px}
.ev-sub{font-size:12px;color:var(--dim);margin-top:2px;line-height:1.5}
.ev-score{display:inline-flex;align-items:center;gap:5px;margin-top:4px}
.ev-score-val{font-family:var(--fd);font-size:19px;font-weight:700;color:var(--ac)}
.ev-score-d{font-family:var(--fd);font-size:11px;font-weight:700}
.du{color:#6ee7b7}.dd{color:#fca5a5}
.ev-details{display:none;margin-top:9px;padding-top:9px;border-top:1px solid var(--brd)}
.ev-card.expanded .ev-details{display:block}
.det-row{display:flex;gap:8px;margin-bottom:5px;font-size:11.5px;line-height:1.5}
.det-lbl{color:var(--dim);flex-shrink:0;width:76px}
.det-val{color:var(--mu)}
.flags-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.flag-pill{font-family:var(--fd);font-size:9px;letter-spacing:.4px;padding:2px 8px;border-radius:9px;background:rgba(245,158,11,.06);color:#fcd34d;border:1px solid rgba(245,158,11,.2)}
.flag-pill.crit{background:rgba(239,68,68,.08);color:#fca5a5;border-color:rgba(239,68,68,.25)}

.empty-state{text-align:center;padding:50px 20px;color:var(--dim)}
.empty-icon{font-size:36px;margin-bottom:10px;opacity:.3}

/* Risco abandono badge */
.risco-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:9px;font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-top:5px}
.risco-baixo{background:rgba(16,185,129,.1);color:#6ee7b7;border:1px solid rgba(16,185,129,.2)}
.risco-moderado{background:rgba(245,158,11,.1);color:#fcd34d;border:1px solid rgba(245,158,11,.2)}
.risco-alto{background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.2)}
.risco-critico{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.35)}

/* Desktop panorama */
.dt-panorama{display:none}
@media(min-width:960px){
  .chart-card{display:none}
  .dt-panorama{display:block;background:var(--sf);border:1px solid var(--brd);border-radius:var(--r);padding:16px 20px 12px;margin-bottom:14px;overflow:hidden}
  .dt-pano-hdr{font-family:var(--fd);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:12px;display:flex;justify-content:space-between}
  .dt-scroll{overflow-x:auto;padding-bottom:6px}
  .dt-scroll::-webkit-scrollbar{height:3px}
  .dt-scroll::-webkit-scrollbar-thumb{background:rgba(212,175,127,.2);border-radius:2px}
  .dt-track{position:relative;min-width:600px;height:100px;margin:0 10px}
  .dt-axis{position:absolute;left:0;right:0;top:50%;height:1px;background:rgba(201,209,217,.07)}
  .dt-phase-bg{position:absolute;top:0;height:100%;border-radius:5px;border:1px solid}
  .dt-phase-lbl{position:absolute;top:5px;left:7px;font-family:var(--fd);font-size:10px;font-style:italic;color:rgba(212,175,127,.5);white-space:nowrap;overflow:hidden;max-width:90%}
  .dt-marker{position:absolute;top:50%;transform:translateY(-50%);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
  .dt-marker:hover .dt-dot{transform:scale(1.4)}
  .dt-dot{width:11px;height:11px;border-radius:50%;border:2px solid var(--bg);transition:transform .15s;flex-shrink:0}
  .dt-lbl{font-family:var(--fd);font-size:8px;color:var(--dim);white-space:nowrap;text-align:center;max-width:50px;overflow:hidden;text-overflow:ellipsis}
  .dt-score-line{position:absolute;inset:0;pointer-events:none;overflow:visible}
}

@media(min-width:960px){
  .score-dims{grid-template-columns:repeat(8,1fr)}
  .chart-card{display:none}
}
</style>
</head>
<body>

<div class="topbar" id="topbar"></div>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>
<aside class="sidebar" id="sidebar"></aside>


<main class="main" id="mainContent">

  <div class="page-header" style="padding-top:8px">
    <div class="pat-nome" id="patNome">Carregando...</div>
    <div class="pat-sub" id="patSub"></div>
  </div>

  <!-- Paciente Nav injetado via paciente-nav.js -->
  <div id="paciente-nav-bar"></div>

  <!-- BANNERS -->
  <div class="gen-banner" id="genBanner">
    <div class="gen-spinner"></div>
    <span id="genTxt">Analisando jornada clínica com IA...</span>
  </div>
  <div class="ok-banner" id="okBanner" style="display:none">
    <span>✓</span><span>Timeline atualizada · sem mudanças desde a última análise</span>
  </div>

  <!-- SCORE HERO -->
  <div class="score-hero" id="scoreHero" style="display:none">
    <div class="score-main">
      <div class="score-lbl">Score Clínico Global</div>
      <div class="score-val" id="scoreVal">--</div>
      <div class="score-delta same" id="scoreDelta">--</div>
    </div>
    <div class="score-dims" id="scoreDims"></div>
  </div>

  <!-- DESKTOP PANORAMA -->
  <div class="dt-panorama" id="dtPanorama">
    <div class="dt-pano-hdr">
      <span>Evolução Longitudinal</span>
      <span id="dtRange">--</span>
    </div>
    <div class="dt-scroll">
      <div class="dt-track" id="dtTrack">
        <div class="dt-axis"></div>
      </div>
    </div>
  </div>

  <!-- MINI CHART (mobile) -->
  <div class="chart-card" id="chartCard" style="display:none">
    <div class="chart-hdr">
      <span>Evolução do Score</span>
      <span id="chartRange">--</span>
    </div>
    <div class="chart-area">
      <svg class="chart-svg" id="chartSvg" viewBox="0 0 400 70" preserveAspectRatio="none"></svg>
    </div>
  </div>

  <!-- FEED -->
  <div class="feed" id="feed"></div>

</main>

<script src="/js/shared.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/paciente-nav.js"></script>
<script>
var PACIENTE_ID = location.pathname.split('/').pop();
renderNav();
checkAuth();
renderUserPill();

var FLAG_LBL = {
  ansiedade_elevada:'Ansiedade Elevada',conflito_relacional:'Conflito Relacional',
  risco_depressivo:'Risco Depressivo',burnout_provavel:'Burnout Provável',
  trauma_indicado:'Trauma Indicado',isolamento_social:'Isolamento Social',
  instabilidade_emocional:'Instabilidade Emocional',baixa_autoestima:'Baixa Autoestima',
  risco_suicida:'Risco Suicida',ideacao_suicida:'Ideação Suicida',
  avaliacao_psiquiatrica:'Avaliação Psiquiátrica',neurodivergencia_provavel:'Neurodivergência Provável',
  vulnerabilidade_relacional:'Vulnerabilidade Relacional',crise_existencial:'Crise Existencial'
};
var CRIT_FLAGS   = ['risco_suicida','ideacao_suicida','avaliacao_psiquiatrica'];
var FLAG_NAMES_CRIT = {risco_suicida:'⚠️ Risco Suicida',ideacao_suicida:'⚠️ Ideação Suicida',avaliacao_psiquiatrica:'🔔 Avaliação Psiquiátrica Indicada'};
var DOC_LABELS   = {laudo:'Laudo',declaracao:'Declaração',alta:'Alta',encaminhamento_psiq:'Encaminhamento Psiq.',recibo_sessao:'Recibo'};
var RISCO_COR    = {verde:'#6ee7b7',amarelo:'#fcd34d',vermelho:'#fca5a5'};

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtD(iso){if(!iso)return'';var d=new Date(iso);return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});}
function fmtMs(iso){if(!iso)return'';var d=new Date(iso);return d.toLocaleDateString('pt-BR',{month:'short',year:'2-digit'});}

function renderDims(idx){
  var el=document.getElementById('scoreDims');if(!el||!idx)return;
  var src=idx.dimensoes||idx;
  var dims=[{id:'D1',lbl:'Emocional'},{id:'D2',lbl:'Cognitivo'},{id:'D3',lbl:'Relacional'},
    {id:'D4',lbl:'Funcional'},{id:'D5',lbl:'Existencial'},{id:'D6',lbl:'Físico'},
    {id:'D7',lbl:'Autoestima'}];
  el.innerHTML=dims.map(function(d){var v=parseFloat(src[d.id])||0;
    return'<div class="dim-item"><div class="dim-lbl">'+d.lbl+'</div>'
      +'<div class="dim-bar-bg"><div class="dim-bar" style="width:'+v+'%"></div></div>'
      +'<div class="dim-val">'+Math.round(v)+'</div></div>';
  }).join('');;
}

function renderChart(hist){
  var svg=document.getElementById('chartSvg');
  if(!svg||!hist||hist.length<2){if(svg)svg.innerHTML='';return;}
  var W=400,H=70,mn=40,mx=100;
  var xs=hist.map(function(_,i){return(i/(hist.length-1))*W;});
  var ys=hist.map(function(p){return H-((parseFloat(p.score_global)-mn)/(mx-mn))*(H-12)-5;});
  var path='M '+xs[0]+','+ys[0];
  for(var i=1;i<hist.length;i++){var c=(xs[i-1]+xs[i])/2;path+=' C '+c+','+ys[i-1]+' '+c+','+ys[i]+' '+xs[i]+','+ys[i];}
  var fill=path+' L '+xs[xs.length-1]+','+H+' L '+xs[0]+','+H+' Z';
  svg.innerHTML='<defs><linearGradient id="gc" x1="0" y1="0" x2="0" y2="1">'
    +'<stop offset="0%" stop-color="rgba(212,175,127,0.3)"/>'
    +'<stop offset="100%" stop-color="rgba(212,175,127,0)"/>'
    +'</linearGradient></defs>'
    +'<path d="'+fill+'" fill="url(#gc)"/>'
    +'<path d="'+path+'" fill="none" stroke="#D4AF7F" stroke-width="2"/>'
    +hist.map(function(p,i){return'<circle cx="'+xs[i]+'" cy="'+ys[i]+'" r="3" fill="#0B132B" stroke="#D4AF7F" stroke-width="1.5"/>';
    }).join('')
    +'<text x="'+xs[xs.length-1]+'" y="'+(ys[ys.length-1]-6)+'" text-anchor="middle" font-family="Satoshi,sans-serif" font-size="11" fill="#D4AF7F" font-weight="700">'+Math.round(parseFloat(hist[hist.length-1].score_global))+'</text>';
}

function renderFeed(data){
  var feed=document.getElementById('feed');
  var eventos=data.eventos||[];
  var fases=data.fases||[];
  if(!eventos.length){
    feed.innerHTML='<div class="empty-state"><div class="empty-icon">🕐</div><p>Nenhum evento registrado ainda.</p></div>';
    return;
  }
  var html='';
  var total=eventos.length;

  if(fases.length){
    // Show phases as intro section, then ALL events in chronological order
    html+='<div class="phase-divider" style="margin-top:0">'
      +'<span class="phase-icon">🧩</span>'
      +'<div><div class="phase-name">Fases Identificadas pela IA</div>'
      +'<div class="phase-period">'+fases.map(function(f){return(f.emoji||'•')+' '+f.nome;}).join(' · ')+'</div>'
      +'</div></div>';
  }

  // Render ALL events chronologically — no slicing
  eventos.forEach(function(ev){html+=renderEvCard(ev);});

  feed.querySelectorAll('.ev-card').forEach(function(c){
    c.addEventListener('click',function(){this.classList.toggle('expanded');});
  });
}

function renderEvCard(ev){
  var dotCls=ev.tipo;
  var badgeTxt={sessao:'Sessão',mapeamento:'Mapeamento',documento:'Documento',cid:'CID',flag:'Flag Crítica','score-up':'Sessão ↑','score-down':'Sessão ↓',marco:'Marco'};
  var badgeCls={sessao:'b-sessao',mapeamento:'b-mapa',documento:'b-doc',cid:'b-cid',flag:'b-flag','score-up':'b-sessao','score-down':'b-flag',marco:'b-marco',flag:'b-flag'};
  var cardCls='ev-card'+(ev.tipo==='flag'?' t-flag':ev.tipo==='marco'?' t-marco':ev.tipo==='score-up'?' t-sup':ev.tipo==='score-down'?' t-sdown':'');

  var title='',sub='';
  if(ev.tipo==='sessao'||ev.tipo==='score-up'||ev.tipo==='score-down'){
    title='Sessão '+(ev.sessao_numero||'')+(ev.tipo==='score-up'?' — Score subiu':ev.tipo==='score-down'?' — Score caiu':'');
    if(ev.is_milestone)title='🎯 Marco — Sessão '+ev.sessao_numero;
    sub=ev.resumo?ev.resumo.substring(0,100)+(ev.resumo.length>100?'...':''):'Sessão realizada.';
  }else if(ev.tipo==='mapeamento'){
    title=ev.versao>1?'Mapeamento Atualizado — v'+ev.versao:'Mapeamento Clínico Inicial';
    sub='Análise multidimensional gerada com IA.';
  }else if(ev.tipo==='flag'){
    title=FLAG_NAMES_CRIT[ev.flag_nome]||('⚠️ '+(FLAG_LBL[ev.flag_nome]||esc(ev.flag_nome||'')));
    sub='Indicador crítico identificado no mapeamento v'+(ev.versao_mapeamento||1)+'. Atenção clínica recomendada.';
  }else if(ev.tipo==='cid'){
    title=(ev.cid_codigo||'')+' — '+(ev.cid_nome||'');
    sub='CID confirmado durante o acompanhamento.';
  }else if(ev.tipo==='documento'){
    title=DOC_LABELS[ev.tipo_documento]||'Documento Clínico';
    sub=ev.titulo||'';
  }

  var scoreHtml='';
  if(ev.score!==null&&ev.score!==undefined){
    var d=ev.score_delta;
    var dc=d>0?'du':d<0?'dd':'';
    var ds=d>0?'+'+Math.round(d):d<0?''+Math.round(d):'';
    scoreHtml='<div class="ev-score"><span class="ev-score-val">'+Math.round(ev.score)+'</span>'
      +(ds?'<span class="ev-score-d '+dc+'">'+ds+'</span>':'')+'</div>';
  }

  var detHtml='';
  if(ev.risco_nivel)detHtml+='<div class="det-row"><span class="det-lbl">Risco</span><span class="det-val" style="color:'+(RISCO_COR[ev.risco_nivel]||'#ccc')+'">'+ev.risco_nivel+'</span></div>';
  // Risco de abandono badge
  if(ev.risco_abandono&&ev.risco_abandono.nivel){
    var ra=ev.risco_abandono;
    var raCls='risco-'+(ra.nivel||'baixo').toLowerCase();
    detHtml+='<div class="det-row"><span class="det-lbl">Abandono</span><span class="det-val"><span class="risco-badge '+raCls+'">'+esc((ra.nivel||'').toUpperCase())+'</span></span></div>';
  }
  if(ev.flags&&ev.flags.length){
    detHtml+='<div class="flags-row">'+ev.flags.map(function(f){
      return'<span class="flag-pill'+(CRIT_FLAGS.indexOf(f)>-1?' crit':'')+'">'+esc(FLAG_LBL[f]||f)+'</span>';
    }).join('')+'</div>';
  }

  return'<div class="ev"><div class="ev-dot '+dotCls+'"></div>'
    +'<div class="'+cardCls+'">'
    +'<div class="ev-top"><span class="ev-badge '+(badgeCls[ev.tipo]||'b-sessao')+'">'+(badgeTxt[ev.tipo]||ev.tipo)+'</span>'
    +'<span class="ev-date">'+esc(fmtD(ev.data))+'</span></div>'
    +'<div class="ev-title">'+esc(title)+'</div>'
    +'<div class="ev-sub">'+esc(sub)+'</div>'
    +scoreHtml
    +'<div class="ev-details">'+detHtml+'</div>'
    +'</div></div>';
}

function renderDesktopPanorama(data){
  var track=document.getElementById('dtTrack');
  var range=document.getElementById('dtRange');
  if(!track)return;
  var eventos=data.eventos||[];
  var fases=data.fases||[];
  var hist=data.evolucao_historico||[];
  if(!eventos.length){track.innerHTML='<div class="dt-axis"></div>';return;}

  // Update range label
  if(hist.length>=2&&range){
    range.textContent=fmtMs(hist[0].gerado_em)+' — '+fmtMs(hist[hist.length-1].gerado_em);
  }

  // Phase backgrounds
  var phaseHtml='<div class="dt-axis"></div>';
  var phaseColors=[
    'rgba(59,130,246,.04)','rgba(212,175,127,.04)','rgba(16,185,129,.04)','rgba(139,92,246,.04)'
  ];
  var phaseBorders=[
    'rgba(59,130,246,.12)','rgba(212,175,127,.1)','rgba(16,185,129,.12)','rgba(139,92,246,.12)'
  ];
  if(fases.length){
    var sorted=fases.slice().sort(function(a,b){return(parseFloat(a.inicio_pct)||0)-(parseFloat(b.inicio_pct)||0);});
    sorted.forEach(function(f,fi){
      var s=parseFloat(f.inicio_pct)||0;
      var e=fi<sorted.length-1?(parseFloat(sorted[fi+1].inicio_pct)||100):100;
      phaseHtml+='<div class="dt-phase-bg" style="left:'+s+'%;width:'+(e-s)+'%;background:'+phaseColors[fi%4]+';border-color:'+phaseBorders[fi%4]+'">'
        +'<span class="dt-phase-lbl">'+(f.emoji||'')+(f.emoji?' ':'')+esc(f.nome||'')+'</span></div>';
    });
  }

  // Score sparkline
  var svgLine='';
  if(hist.length>=2){
    var W=700,H=100,mn=40,mx=100;
    var xs=hist.map(function(_,i){return(i/(hist.length-1))*W;});
    var ys=hist.map(function(p){return H-((parseFloat(p.score_global)-mn)/(mx-mn))*(H*0.65)-H*0.15;});
    var p2='M '+xs[0]+','+ys[0];
    for(var i=1;i<hist.length;i++){var c=(xs[i-1]+xs[i])/2;p2+=' C '+c+','+ys[i-1]+' '+c+','+ys[i]+' '+xs[i]+','+ys[i];}
    svgLine='<svg class="dt-score-line" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none">'
      +'<path d="'+p2+'" fill="none" stroke="rgba(212,175,127,0.45)" stroke-width="1.5" stroke-dasharray="4,3"/></svg>';
  }

  // Event markers
  var dotColors={
    sessao:'rgba(59,130,246,.85)',mapeamento:'rgba(212,175,127,.9)',
    documento:'rgba(139,92,246,.8)',cid:'rgba(16,185,129,.85)',
    flag:'rgba(239,68,68,.9)',marco:'#D4AF7F',
    'score-up':'#10b981','score-down':'rgba(239,68,68,.8)'
  };
  var markersHtml=eventos.map(function(ev,i){
    var xp=eventos.length>1?(i/(eventos.length-1))*94+3:50;
    var col=dotColors[ev.tipo]||'#ccc';
    var lbl=ev.tipo==='sessao'?'S'+(ev.sessao_numero||''):fmtD(ev.data).substring(0,5);
    return'<div class="dt-marker" style="left:'+xp+'%" title="'+esc(fmtD(ev.data))+'">'
      +'<div class="dt-dot" style="background:'+col+'"></div>'
      +'<div class="dt-lbl">'+esc(lbl)+'</div></div>';
  }).join('');

  track.innerHTML='<div class="dt-axis"></div>'+phaseHtml+svgLine+markersHtml;
}

async function init(){
  document.getElementById('genBanner').style.display='flex';
  try{
    renderPacienteNav(PACIENTE_ID,'timeline');
    var data=await api('/api/timeline/'+PACIENTE_ID);

    if(data.paciente){
      document.getElementById('patNome').textContent=data.paciente.nome_completo||'';
      document.getElementById('patSub').textContent='Timeline Evolutiva · '+
        (data.stats.total_sessoes||0)+' sessões registradas';
    }

    var stats=data.stats||{};
    if(stats.score_atual!==null&&stats.score_atual!==undefined){
      document.getElementById('scoreVal').textContent=Math.round(stats.score_atual);
      var dTotal=stats.score_inicial!==null?(stats.score_atual-stats.score_inicial):null;
      var de=document.getElementById('scoreDelta');
      if(dTotal!==null){
        de.className='score-delta'+(dTotal>0?' up':dTotal<0?' down':' same');
        de.textContent=(dTotal>0?'▲ +':dTotal<0?'▼ ':'= ')+Math.abs(Math.round(dTotal))+(dTotal!==0?' pts desde o início':' sem variação');
      }else de.style.display='none';
    }
    // Use evolucao_historico indices for dims (most accurate), fallback to mapeamento
    var hist=data.evolucao_historico||[];
    var lastHist=hist.length?hist[hist.length-1]:null;
    var lastMap=data.mapeamentos&&data.mapeamentos.length?data.mapeamentos[data.mapeamentos.length-1]:null;
    var idxSource=(lastHist&&lastHist.indices_json)?lastHist.indices_json:(lastMap&&lastMap.indices_json?lastMap.indices_json:null);
    if(idxSource)renderDims(idxSource);
    document.getElementById('scoreHero').style.display='flex';

    renderChart(data.evolucao_historico||[]);
    document.getElementById('chartCard').style.display='block';

    var hist=data.evolucao_historico||[];
    if(hist.length>=2){
      document.getElementById('chartRange').textContent=fmtMs(hist[0].gerado_em)+' — '+fmtMs(hist[hist.length-1].gerado_em);
    }

    if(data.mudou){
      document.getElementById('genTxt').textContent='Identificando fases terapêuticas...';
      try{
        var gerado=await api('/api/timeline/'+PACIENTE_ID+'/gerar','POST',{hash:data.hash});
        data.fases=gerado.fases||[];
      }catch(iaErr){
        console.warn('IA fases falhou:',iaErr.message);
        data.fases=data.fases||[];
      }
    }else{
      document.getElementById('genBanner').style.display='none';
      document.getElementById('okBanner').style.display='flex';
    }

    renderFeed(data);
    renderDesktopPanorama(data);
    document.getElementById('genBanner').style.display='none';

  }catch(err){
    document.getElementById('genBanner').style.display='none';
    document.getElementById('feed').innerHTML='<div class="empty-state"><div class="empty-icon">⚠️</div><p>'+esc(err.message||'Erro ao carregar timeline.')+'</p></div>';
    showToast(err.message||'Erro ao carregar timeline.','error');
  }
}

init();
</script>
</body>
</html>
