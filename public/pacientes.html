<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pacientes — Synapse Core</title>
<meta name="theme-color" content="#0B132B">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0B132B;--surface:#1C2541;--surface-2:rgba(28,37,65,0.7);--accent:#D4AF7F;--acc-dim:rgba(212,175,127,0.1);--acc-brd:rgba(212,175,127,0.22);--text:#F5F7FA;--muted:#C9D1D9;--dim:rgba(201,209,217,0.4);--border:rgba(201,209,217,0.1);--sidebar-w:260px;--topbar-h:60px;--f-d:'Satoshi',sans-serif;--f-b:'Inter',sans-serif;--r:12px}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f-b);background:var(--bg);color:var(--text);min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;height:calc(var(--topbar-h) + env(safe-area-inset-top,0px));padding:0 16px;padding-top:env(safe-area-inset-top,0px);background:var(--surface);border-bottom:1px solid var(--border);position:fixed;top:0;left:0;right:0;z-index:50}
.topbar img{height:28px}
.hamburger{background:none;border:none;color:var(--muted);cursor:pointer;padding:8px;border-radius:8px;font-size:20px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:40;backdrop-filter:blur(2px)}
.overlay.open{display:block}
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);position:fixed;top:0;left:0;bottom:0;z-index:45;display:flex;flex-direction:column;transform:translateX(-100%);transition:transform .3s cubic-bezier(.4,0,.2,1);overflow-y:auto}
.sidebar.open{transform:translateX(0)}
.sb-logo{padding:20px 20px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-logo img{height:32px}
.sb-nav{flex:1;padding:12px 10px;overflow-y:auto}
.nav-section{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);padding:14px 10px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;cursor:pointer;color:var(--muted);font-size:13.5px;text-decoration:none;transition:all .18s;margin-bottom:1px;border:1px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.04);color:var(--text)}
.nav-item.active{background:var(--acc-dim);color:var(--accent);border-color:var(--acc-brd)}
.nav-item .ni{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--accent);color:var(--bg);font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px}
.sb-footer{padding:14px 12px;border-top:1px solid var(--border);flex-shrink:0}
.user-pill{display:flex;align-items:center;gap:10px;padding:10px;background:rgba(11,19,43,.5);border-radius:10px;border:1px solid var(--border)}
.user-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#b8924e);display:flex;align-items:center;justify-content:center;font-family:var(--f-d);font-size:12px;font-weight:700;color:var(--bg);flex-shrink:0;overflow:hidden}
.user-name{font-size:12.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:10px;color:var(--dim)}
.logout-btn{margin-left:auto;background:none;border:none;color:var(--dim);cursor:pointer;font-size:13px;padding:4px 6px;border-radius:6px;font-family:var(--f-b);transition:color .2s}
.logout-btn:hover{color:var(--accent)}
.main{padding:calc(var(--topbar-h) + 28px + env(safe-area-inset-top,0px)) 16px 40px}
.ph{margin-bottom:20px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px}
.ph-title{font-family:var(--f-d);font-size:22px;font-weight:700}
.ph-sub{font-size:12px;color:var(--dim);margin-top:3px}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;border-radius:9px;font-family:var(--f-d);font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .2s;text-decoration:none;letter-spacing:.3px}
.btn-primary{background:linear-gradient(135deg,var(--accent),#b8924e);color:var(--bg);box-shadow:0 4px 16px rgba(212,175,127,.2)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(212,175,127,.3)}
.btn-ghost{background:var(--acc-dim);color:var(--accent);border:1px solid var(--acc-brd)}
.btn-sm{padding:7px 13px;font-size:12px}
.btn-danger{background:rgba(239,68,68,0.1);color:#fca5a5;border:1px solid rgba(239,68,68,0.25)}
.search-bar{display:flex;gap:10px;margin-bottom:16px}
.search-wrap{flex:1;position:relative}
.search-wrap input{width:100%;height:42px;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:var(--f-b);font-size:13px;padding:0 14px 0 38px;outline:none;transition:border-color .2s;-webkit-appearance:none}
.search-wrap input:focus{border-color:var(--acc-brd)}
.search-wrap input::placeholder{color:var(--dim)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:15px;pointer-events:none}
.filter-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface-2);color:var(--muted);transition:all .18s}
.chip:hover{border-color:var(--acc-brd);color:var(--accent)}
.chip.active{background:var(--acc-dim);border-color:var(--acc-brd);color:var(--accent)}
.patients-list{display:flex;flex-direction:column;gap:12px}
.pt-card{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r);padding:16px;transition:border-color .2s}
.pt-card:hover{border-color:rgba(212,175,127,.2)}
.pt-card-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.pt-av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--f-d);font-size:14px;font-weight:700;flex-shrink:0;overflow:hidden}
.pt-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.pt-info{flex:1;min-width:0}
.pt-name{font-family:var(--f-d);font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pt-meta{font-size:11.5px;color:var(--muted);margin-top:3px}
.pt-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.badge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap}
.pt-detail{font-size:12px;color:var(--muted);margin-bottom:12px;display:flex;flex-direction:column;gap:4px}
.pt-actions{display:flex;gap:8px;flex-wrap:wrap}
.empty{text-align:center;padding:48px 20px}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.35}
.empty-title{font-family:var(--f-d);font-size:16px;font-weight:600;color:var(--muted);margin-bottom:6px}
.empty-sub{font-size:13px;color:var(--dim);margin-bottom:20px;line-height:1.6}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:#1a2540;border:1px solid var(--acc-brd);border-radius:18px;padding:28px 24px;width:100%;max-width:420px;position:relative}
.modal-title{font-family:var(--f-d);font-size:16px;font-weight:700;margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--dim);margin-bottom:20px}
.link-box{background:rgba(11,19,43,.7);border:1px solid var(--border);border-radius:9px;padding:12px 14px;font-size:12px;color:var(--muted);word-break:break-all;margin-bottom:14px;line-height:1.5;font-family:monospace}
.modal-actions{display:flex;flex-direction:column;gap:10px}
.modal-row{display:flex;gap:10px}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--dim);cursor:pointer;font-size:18px;line-height:1;padding:4px}
.modal-close:hover{color:var(--text)}
.expiry{font-size:11px;color:var(--dim);text-align:center;margin-top:8px}
.loading{display:flex;gap:5px;justify-content:center;padding:32px}
.loading span{width:7px;height:7px;border-radius:50%;background:var(--accent);opacity:.4;animation:ldot 1.2s ease-in-out infinite}
.loading span:nth-child(2){animation-delay:.2s}
.loading span:nth-child(3){animation-delay:.4s}
@keyframes ldot{0%,80%,100%{opacity:.4;transform:scale(1)}40%{opacity:1;transform:scale(1.3)}}
.page-footer{text-align:center;padding:24px 0 8px;font-size:10px;color:var(--dim)}
.page-footer strong{color:rgba(201,209,217,.5)}
@media(min-width:960px){.topbar{display:none}.overlay{display:none!important}.sidebar{transform:translateX(0)}.main{margin-left:var(--sidebar-w);padding:32px 32px 40px}}
@media(min-width:600px){.main{padding-left:24px;padding-right:24px}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
</style>
</head>
<body>
<div class="topbar">
  <img src="/img/logo-horizontal.png" alt="Synapse Core">
  <button class="hamburger" onclick="toggleSidebar()">&#9776;</button>
</div>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>
<aside class="sidebar" id="sidebar">
  <div class="sb-logo"><img src="/img/logo-horizontal.png" alt="Synapse Core"></div>
  <nav class="sb-nav">
    <div class="nav-section">Principal</div>
    <a href="/dashboard" class="nav-item"><span class="ni">&#9672;</span> Dashboard</a>
    <a href="/pacientes" class="nav-item active"><span class="ni">&#9675;</span> Pacientes</a>
    <div class="nav-section">Avaliação</div>
    <a href="/paciente-novo" class="nav-item"><span class="ni">&#9703;</span> Nova Avaliação</a>
    <div class="nav-section">Sistema</div>
    <a href="/perfil" class="nav-item"><span class="ni">&#9715;</span> Configurações</a>
  </nav>
  <div class="sb-footer">
    <div class="user-pill">
      <div class="user-av" id="userAvatar">ET</div>
      <div style="overflow:hidden;flex:1"><div class="user-name" id="userName">--</div><div class="user-role">Evolution Therapy</div></div>
      <button class="logout-btn" onclick="logout()">Sair</button>
    </div>
  </div>
</aside>

<main class="main">
  <div class="ph">
    <div><div class="ph-title">Pacientes</div><div class="ph-sub" id="phSub">Carregando...</div></div>
    <a href="/paciente-novo" class="btn btn-primary">+ Novo Paciente</a>
  </div>
  <div class="search-bar">
    <div class="search-wrap">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="searchInput" placeholder="Buscar por nome ou email...">
    </div>
  </div>
  <div class="filter-chips">
    <div class="chip active" data-filter="">Todos</div>
    <div class="chip" data-filter="adulto">Adulto</div>
    <div class="chip" data-filter="casal">Casal</div>
    <div class="chip" data-filter="adolescente">Adolescente</div>
    <div class="chip" data-filter="neurodivergente">Neurodivergente</div>
    <div class="chip" data-filter="atleta">Atleta</div>
  </div>
  <div id="listWrap">
    <div class="loading"><span></span><span></span><span></span></div>
  </div>
  <div class="page-footer">
    &copy; 2026 Synapse Core &mdash; <strong>Erick Torritezi</strong>
  </div>
</main>

<!-- Modal Link -->
<div class="modal-overlay" id="linkModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">&#10005;</button>
    <div class="modal-title">&#128279; Link do Formulário</div>
    <div class="modal-sub" id="modalNome">--</div>
    <div class="link-box" id="linkBox">--</div>
    <div class="modal-actions">
      <div class="modal-row">
        <button class="btn btn-primary" style="flex:1" id="copyBtn" onclick="doCopy()">&#128203; Copiar Link</button>
        <a href="#" class="btn btn-ghost" id="waBtn" target="_blank" style="flex:1;justify-content:center">&#128172; WhatsApp</a>
      </div>
    </div>
    <div class="expiry" id="linkExpiry"></div>
  </div>
</div>

<script src="/js/shared.js"></script>
<script>
checkAuth();
renderUserPill();

var currentFilter = '';
var searchTimer = null;
var currentLink = '';

// filter chips
document.querySelectorAll('.chip').forEach(function(chip) {
  chip.addEventListener('click', function() {
    currentFilter = this.dataset.filter;
    document.querySelectorAll('.chip').forEach(function(c) { c.classList.remove('active'); });
    this.classList.add('active');
    loadPatients(document.getElementById('searchInput').value, currentFilter);
  });
});

// search
document.getElementById('searchInput').addEventListener('input', function() {
  clearTimeout(searchTimer);
  var val = this.value;
  searchTimer = setTimeout(function() { loadPatients(val, currentFilter); }, 350);
});

function loadPatients(search, tipo) {
  var wrap = document.getElementById('listWrap');
  wrap.innerHTML = '<div class="loading"><span></span><span></span><span></span></div>';
  var url = '/api/pacientes?';
  if (search) url += 'search=' + encodeURIComponent(search) + '&';
  if (tipo) url += 'tipo=' + encodeURIComponent(tipo);

  api(url).then(function(data) {
    var badge = document.getElementById('badgePacientes');
    if (badge) badge.textContent = data.length;
    document.getElementById('phSub').textContent = data.length + ' paciente' + (data.length !== 1 ? 's' : '') + ' encontrado' + (data.length !== 1 ? 's' : '');
    renderList(data);
  }).catch(function(err) {
    wrap.innerHTML = '<div class="empty"><div class="empty-title">Erro ao carregar</div><div class="empty-sub">' + (err.message || 'Tente novamente') + '</div></div>';
  });
}

function renderList(patients) {
  var wrap = document.getElementById('listWrap');
  if (!patients.length) {
    wrap.innerHTML = '<div class="empty"><div class="empty-icon">&#9675;</div><div class="empty-title">Nenhum paciente encontrado</div><div class="empty-sub">Comece cadastrando seu primeiro paciente.</div><a href="/paciente-novo" class="btn btn-primary">+ Novo Paciente</a></div>';
    return;
  }

  var perfis = {
    adulto:         { label: 'Adulto',        color: '#3b82f6', bg: 'rgba(59,130,246,0.12)'  },
    casal:          { label: 'Casal',          color: '#8b5cf6', bg: 'rgba(139,92,246,0.12)'  },
    adolescente:    { label: 'Adolescente',    color: '#06b6d4', bg: 'rgba(6,182,212,0.12)'   },
    neurodivergente:{ label: 'Neurodiv.',      color: '#D4AF7F', bg: 'rgba(212,175,127,0.12)' },
    atleta:         { label: 'Atleta',         color: '#f97316', bg: 'rgba(249,115,22,0.12)'  }
  };

  var list = document.createElement('div');
  list.className = 'patients-list';

  patients.forEach(function(p) {
    var cfg = perfis[p.perfil_tipo] || perfis.adulto;
    var card = document.createElement('div');
    card.className = 'pt-card';

    // Avatar
    var av = document.createElement('div');
    av.className = 'pt-av';
    av.style.background = cfg.bg;
    av.style.color = cfg.color;
    if (p.foto_url) {
      var img = document.createElement('img');
      img.src = p.foto_url;
      img.alt = '';
      av.appendChild(img);
    } else {
      var parts = p.nome_completo.split(' ');
      var initials = (parts[0][0] + (parts.length > 1 ? parts[parts.length-1][0] : '')).toUpperCase();
      av.textContent = initials;
    }

    // Info
    var info = document.createElement('div');
    info.className = 'pt-info';

    var name = document.createElement('div');
    name.className = 'pt-name';
    name.textContent = p.nome_completo;

    var metaParts = [];
    if (p.idade) metaParts.push(p.idade + ' anos');
    if (p.pacote_nome) metaParts.push(p.pacote_nome);
    if (p.pacote_id && p.qtd_sessoes) metaParts.push('Sessão ' + (p.sessoes_realizadas || 0) + '/' + p.qtd_sessoes);

    var meta = document.createElement('div');
    meta.className = 'pt-meta';
    meta.textContent = metaParts.join(' · ');

    var badges = document.createElement('div');
    badges.className = 'pt-badges';

    var typeBadge = document.createElement('span');
    typeBadge.className = 'badge';
    typeBadge.style.background = cfg.bg;
    typeBadge.style.color = cfg.color;
    typeBadge.textContent = cfg.label;
    badges.appendChild(typeBadge);

    if (p.total_mapeamentos > 0) {
      var mb = document.createElement('span');
      mb.className = 'badge';
      mb.style.background = 'rgba(16,185,129,0.12)';
      mb.style.color = '#6ee7b7';
      mb.textContent = 'Mapeado';
      badges.appendChild(mb);
    }

    if (p.link_ativo > 0) {
      var lb = document.createElement('span');
      lb.className = 'badge';
      lb.style.background = 'rgba(245,158,11,0.1)';
      lb.style.color = '#fcd34d';
      lb.textContent = 'Link ativo';
      badges.appendChild(lb);
    }

    info.appendChild(name);
    info.appendChild(meta);
    info.appendChild(badges);

    // Top row
    var top = document.createElement('div');
    top.className = 'pt-card-top';
    top.appendChild(av);
    top.appendChild(info);
    card.appendChild(top);

    // Detail
    var detail = document.createElement('div');
    detail.className = 'pt-detail';
    if (p.email) {
      var em = document.createElement('span');
      em.textContent = p.email;
      detail.appendChild(em);
    }
    if (p.telefone) {
      var tel = document.createElement('span');
      tel.textContent = p.telefone;
      detail.appendChild(tel);
    }
    card.appendChild(detail);

    // Actions
    var actions = document.createElement('div');
    actions.className = 'pt-actions';

    var btnLink = document.createElement('button');
    btnLink.className = 'btn btn-primary btn-sm';
    btnLink.textContent = 'Gerar Link';
    btnLink.dataset.id   = p.id;
    btnLink.dataset.nome = p.nome_completo;
    btnLink.dataset.tel  = p.telefone || '';
    btnLink.addEventListener('click', function() {
      gerarLink(this.dataset.id, this.dataset.nome, this.dataset.tel);
    });
    actions.appendChild(btnLink);

    // Mapeamento button
    var btnMap = document.createElement('a');
    btnMap.className = 'btn btn-ghost btn-sm';
    btnMap.href = '/mapeamento/' + p.id;
    btnMap.textContent = p.total_mapeamentos > 0 ? 'Ver Mapeamento' : 'Gerar Mapeamento';
    if (p.total_mapeamentos === 0 && p.link_ativo === 0) {
      btnMap.style.opacity = '.5';
    }
    actions.appendChild(btnMap);

    // Sessões button
    var btnSess = document.createElement('a');
    btnSess.className = 'btn btn-ghost btn-sm';
    btnSess.href = '/sessoes/' + p.id;
    btnSess.textContent = p.sessoes_realizadas > 0 ? 'Sessões (' + p.sessoes_realizadas + ')' : 'Sessões';
    actions.appendChild(btnSess);

    // Documentos button
    var btnDoc = document.createElement('a');
    btnDoc.className = 'btn btn-ghost btn-sm';
    btnDoc.href = '/documentos/' + p.id;
    btnDoc.textContent = '📄 Docs';
    actions.appendChild(btnDoc);

    if (p.telefone) {
      var tel2 = p.telefone.replace(/\D/g, '');
      var btnWa = document.createElement('a');
      btnWa.className = 'btn btn-ghost btn-sm';
      btnWa.href = 'https://wa.me/55' + tel2;
      btnWa.target = '_blank';
      btnWa.textContent = 'WhatsApp';
      actions.appendChild(btnWa);
    }

    card.appendChild(actions);
    list.appendChild(card);
  });

  wrap.innerHTML = '';
  wrap.appendChild(list);
}

// ── GERAR LINK ──
function gerarLink(id, nome, tel) {
  showToast('Gerando link...', 'info');
  api('/api/pacientes/' + id + '/gerar-link', 'POST', { dias_validade: 7 })
    .then(function(data) {
      currentLink = data.link;
      document.getElementById('modalNome').textContent = 'Paciente: ' + nome;
      document.getElementById('linkBox').textContent = data.link;
      var exp = new Date(data.expira_em);
      document.getElementById('linkExpiry').textContent = 'Expira em ' + exp.toLocaleDateString('pt-BR');
      var waBtn = document.getElementById('waBtn');
      if (tel) {
        var t = tel.replace(/\D/g, '');
        var msg = 'Ol\u00e1! Segue o link para preenchimento do formul\u00e1rio: ' + data.link;
        waBtn.href = 'https://wa.me/55' + t + '?text=' + encodeURIComponent(msg);
        waBtn.style.display = '';
      } else {
        waBtn.style.display = 'none';
      }
      document.getElementById('linkModal').classList.add('open');
    })
    .catch(function(err) {
      showToast(err.message || 'Erro ao gerar link.', 'error');
    });
}

function doCopy() {
  copyText(currentLink, document.getElementById('copyBtn'));
}

function closeModal() {
  document.getElementById('linkModal').classList.remove('open');
}

document.getElementById('linkModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

loadPatients('', '');
</script>
</body>
</html>
