<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Programas — Synapse Core</title>
<meta name="theme-color" content="#0B132B">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<link rel="icon" href="/favicon.ico">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0B132B;--sf:#1C2541;--s2:rgba(28,37,65,.75);--ac:#D4AF7F;--adim:rgba(212,175,127,.1);--abrd:rgba(212,175,127,.25);--tx:#F5F7FA;--mu:#C9D1D9;--dim:rgba(201,209,217,.4);--brd:rgba(201,209,217,.1);--fd:'Satoshi',sans-serif;--fb:'Inter',sans-serif;--r:12px;--sw:260px;--th:60px}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--fb);background:var(--bg);color:var(--tx);min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;height:calc(var(--th) + env(safe-area-inset-top,0px));padding:env(safe-area-inset-top,0px) 16px 0;background:var(--sf);border-bottom:1px solid var(--brd);position:fixed;top:0;left:0;right:0;z-index:50}
.topbar img{height:28px}
.hamburger{background:none;border:none;color:var(--mu);cursor:pointer;padding:8px;border-radius:8px;font-size:20px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:40;backdrop-filter:blur(2px)}
.overlay.open{display:block}
.sidebar{width:var(--sw);background:var(--sf);border-right:1px solid var(--brd);position:fixed;top:0;left:0;bottom:0;z-index:45;display:flex;flex-direction:column;transform:translateX(-100%);transition:transform .3s cubic-bezier(.4,0,.2,1);overflow-y:auto}
.sidebar.open{transform:translateX(0)}
.sb-logo{padding:20px 20px 18px;border-bottom:1px solid var(--brd)}
.sb-logo img{height:32px}
.sb-nav{flex:1;padding:12px 10px;overflow-y:auto}
.nav-section{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);padding:14px 10px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;color:var(--mu);font-size:13.5px;text-decoration:none;transition:all .18s;margin-bottom:1px;border:1px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.04);color:var(--tx)}
.nav-item.active{background:var(--adim);color:var(--ac);border-color:var(--abrd)}
.nav-item .ni{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.sb-footer{padding:14px 12px;border-top:1px solid var(--brd)}
.user-pill{display:flex;align-items:center;gap:10px;padding:10px;background:rgba(11,19,43,.5);border-radius:10px;border:1px solid var(--brd)}
.user-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--ac),#b8924e);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:12px;font-weight:700;color:var(--bg);flex-shrink:0;overflow:hidden}
.user-name{font-size:12.5px;font-weight:500}
.user-role{font-size:10px;color:var(--dim)}
.logout-btn{margin-left:auto;background:none;border:none;color:var(--dim);cursor:pointer;font-size:13px;padding:4px 6px}
.main{padding:calc(var(--th)+28px+env(safe-area-inset-top,0px)) 16px 60px}
/* Header */
.ph{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:20px}
.ph-title{font-family:var(--fd);font-size:22px;font-weight:700}
.ph-sub{font-size:12px;color:var(--dim);margin-top:3px}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:9px;font-family:var(--fd);font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .2s;text-decoration:none}
.btn-primary{background:linear-gradient(135deg,var(--ac),#b8924e);color:var(--bg);box-shadow:0 4px 14px rgba(212,175,127,.2)}
.btn-ghost{background:var(--adim);color:var(--ac);border:1px solid var(--abrd)}
.btn-danger{background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.2)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn:disabled{opacity:.5;cursor:not-allowed}
/* Program cards */
.prog-list{display:flex;flex-direction:column;gap:12px}
.prog-card{background:var(--s2);border:1px solid var(--brd);border-radius:var(--r);overflow:hidden;transition:border-color .2s}
.prog-card.inativo{opacity:.55;border-style:dashed}
.prog-card::before{content:'';display:block;height:2px;background:linear-gradient(90deg,var(--ac),transparent)}
.prog-header{padding:16px 16px 12px;cursor:pointer;display:flex;align-items:flex-start;gap:12px}
.prog-emoji{font-size:22px;flex-shrink:0;margin-top:1px}
.prog-info{flex:1;min-width:0}
.prog-nome{font-family:var(--fd);font-size:15px;font-weight:700;margin-bottom:3px}
.prog-meta{font-size:11.5px;color:var(--dim);display:flex;flex-wrap:wrap;gap:8px}
.prog-badge{background:rgba(212,175,127,.1);border:1px solid rgba(212,175,127,.2);border-radius:5px;padding:1px 7px;font-size:11px;color:var(--ac);font-weight:600}
.prog-toggle-icon{color:var(--dim);font-size:12px;flex-shrink:0;transition:transform .2s}
.prog-card.open .prog-toggle-icon{transform:rotate(-180deg)}
/* Expanded body */
.prog-body{display:none;padding:0 16px 16px;border-top:1px solid var(--brd)}
.prog-card.open .prog-body{display:block}
.prog-desc{font-size:13px;color:var(--mu);line-height:1.65;margin:12px 0}
.prog-valores{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.valor-box{background:rgba(11,19,43,.5);border:1px solid var(--brd);border-radius:8px;padding:10px}
.valor-lbl{font-size:10.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px}
.valor-num{font-family:var(--fd);font-size:16px;font-weight:700;color:var(--ac)}
.valor-detalhe{font-size:10.5px;color:var(--dim);margin-top:2px}
/* Session plan */
.plano-title{font-family:var(--fd);font-size:12px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;margin-top:14px}
.sessao-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--brd)}
.sessao-item:last-child{border-bottom:none}
.sessao-num{font-family:var(--fd);font-size:11px;font-weight:700;color:var(--ac);min-width:28px;flex-shrink:0;padding-top:1px}
.sessao-titulo{font-size:13px;font-weight:600;margin-bottom:2px}
.sessao-desc{font-size:12px;color:var(--dim);line-height:1.55}
.prog-actions{display:flex;gap:8px;flex-wrap:wrap;padding-top:14px;border-top:1px solid var(--brd);margin-top:14px}
.recomendado-badge{font-size:10.5px;color:var(--dim);margin-left:auto;align-self:center;font-style:italic}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;align-items:flex-start;justify-content:center;padding:16px;backdrop-filter:blur(4px);overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:#1a2540;border:1px solid var(--abrd);border-radius:18px;padding:24px 20px;width:100%;max-width:520px;margin:auto;position:relative}
.modal-title{font-family:var(--fd);font-size:16px;font-weight:700;margin-bottom:16px}
.modal-close{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--dim);cursor:pointer;font-size:18px}
.field{margin-bottom:12px}
.field label{display:block;font-size:10.5px;font-weight:500;color:var(--mu);letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;background:rgba(11,19,43,.6);border:1px solid var(--brd);border-radius:8px;color:var(--tx);font-family:var(--fb);font-size:13.5px;padding:9px 12px;outline:none;transition:border-color .2s;-webkit-appearance:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--abrd)}
.field select option{background:#1C2541}
.field textarea{min-height:70px;resize:vertical;line-height:1.5}
.field-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
/* Session editor */
.sessao-editor{background:rgba(11,19,43,.4);border:1px solid var(--brd);border-radius:9px;padding:12px;margin-bottom:8px}
.sessao-editor-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.sessao-editor-num{font-family:var(--fd);font-size:12px;font-weight:700;color:var(--ac);min-width:28px}
.btn-remove-sess{background:none;border:none;color:var(--dim);cursor:pointer;font-size:16px;padding:0;margin-left:auto}
.btn-remove-sess:hover{color:#fca5a5}
.empty{text-align:center;padding:48px 16px;color:var(--dim)}
.page-footer{text-align:center;padding:20px 0 8px;font-size:10px;color:var(--dim)}
.page-footer strong{color:rgba(201,209,217,.4)}
@media(min-width:960px){
  .topbar{display:none}.overlay{display:none!important}.sidebar{transform:translateX(0)}
  .main{margin-left:var(--sw);padding:32px 32px 60px}
}
@media(min-width:600px){.main{padding-left:24px;padding-right:24px}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
</style>
</head>
<body>
<div class="topbar" id="topbar"></div>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>
<aside class="sidebar" id="sidebar"></aside>

<main class="main">
  <div class="ph">
    <div>
      <div class="ph-title">&#128203; Programas</div>
      <div class="ph-sub" id="phSub">Carregando...</div>
    </div>
    <button class="btn btn-primary" onclick="abrirModal()">+ Novo Programa</button>
  </div>
  <div class="prog-list" id="progList">
    <div class="empty">Carregando...</div>
  </div>
  <div class="page-footer">&copy; 2026 Synapse Core &mdash; <strong>Erick Torritezi</strong></div>
</main>

<!-- Modal criar/editar -->
<div class="modal-overlay" id="progModal">
  <div class="modal">
    <button class="modal-close" onclick="fecharModal()">&#10005;</button>
    <div class="modal-title" id="modalTitle">Novo Programa</div>
    <div class="field">
      <label>Nome do Programa <span style="color:var(--ac)">*</span></label>
      <input type="text" id="fNome" placeholder="Ex: Destravamento & Decisão">
    </div>
    <div class="field">
      <label>Público-alvo</label>
      <select id="fPublico">
        <option value="adulto">Adulto</option>
        <option value="casal">Casal</option>
        <option value="adolescente">Adolescente</option>
        <option value="neurodivergente">Neurodivergente</option>
        <option value="atleta">Atleta</option>
      </select>
    </div>
    <div class="field">
      <label>Descrição <span style="font-size:10px;color:var(--dim)">(usada pela IA para recomendar)</span></label>
      <textarea id="fDesc" placeholder="Para quem é este programa e o que trata..."></textarea>
    </div>
    <div class="field-row">
      <div class="field" style="margin:0">
        <label>Nº de Sessões</label>
        <input type="number" id="fSessoes" min="1" placeholder="Ex: 8">
      </div>
      <div class="field" style="margin:0">
        <label>Valor à Vista</label>
        <input type="number" id="fAvista" step="0.01" placeholder="0,00">
      </div>
      <div class="field" style="margin:0">
        <label>Parcelas × Valor</label>
        <input type="text" id="fParcelado" placeholder="5x 270,00">
      </div>
    </div>
    <!-- Session plan editor -->
    <div style="margin-top:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <label style="font-size:10.5px;font-weight:500;color:var(--mu);letter-spacing:.8px;text-transform:uppercase">Plano de Sessões</label>
        <button class="btn btn-ghost btn-sm" onclick="adicionarSessaoEditor()">+ Sessão</button>
      </div>
      <div id="sessoesEditor"></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn btn-ghost" onclick="fecharModal()" style="flex:1;justify-content:center">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarPrograma()" style="flex:2;justify-content:center" id="btnSalvar">Salvar Programa</button>
    </div>
  </div>
</div>

<script src="/js/nav.js"></script>
<script src="/js/shared.js"></script>
<script>
renderNav();
checkAuth();
renderUserPill();

var programas = [];
var editandoId = null;
var PERFIL_EMOJIS = {adulto:'🧑',casal:'💑',adolescente:'🧒',neurodivergente:'🧠',atleta:'⚡'};

window.addEventListener('DOMContentLoaded', carregarProgramas);

function carregarProgramas() {
  api('/api/programas')
    .then(function(data) {
      programas = data;
      var ativos = data.filter(function(p){return p.ativo;}).length;
      document.getElementById('phSub').textContent = ativos + ' programa' + (ativos!==1?'s':'') + ' ativo' + (ativos!==1?'s':'') + ' · ' + data.length + ' total';
      renderProgramas(data);
    })
    .catch(function(e){ showToast('Erro ao carregar: '+e.message,'error'); });
}

function renderProgramas(list) {
  var wrap = document.getElementById('progList');
  if (!list.length) {
    wrap.innerHTML = '<div class="empty">Nenhum programa cadastrado.</div>';
    return;
  }
  wrap.innerHTML = '';
  list.forEach(function(p) {
    var card = document.createElement('div');
    card.className = 'prog-card' + (p.ativo ? '' : ' inativo');
    card.id = 'prog_'+p.id;

    var sessoes = p.sessoes_json || [];
    var valorAvista = p.valor_avista ? 'R$ '+parseFloat(p.valor_avista).toFixed(2).replace('.',',') : '--';
    var valorParc   = (p.parcelas && p.valor_parcelado)
      ? p.parcelas+'x R$ '+parseFloat(p.valor_parcelado).toFixed(2).replace('.',',') : '--';

    card.innerHTML =
      '<div class="prog-header" onclick="toggleCard('+p.id+')">'
        +'<div class="prog-emoji">'+(PERFIL_EMOJIS[p.publico_alvo]||'📋')+'</div>'
        +'<div class="prog-info">'
          +'<div class="prog-nome">'+escH(p.nome)+(p.ativo?'':' <span style="font-size:11px;color:var(--dim)">(inativo)</span>')+'</div>'
          +'<div class="prog-meta">'
            +'<span class="prog-badge">'+escH(p.publico_alvo||'adulto')+'</span>'
            +(p.qtd_sessoes ? '<span>'+p.qtd_sessoes+' sessões</span>' : '<span>Contínuo</span>')
            +'<span>'+valorAvista+'</span>'
          +'</div>'
        +'</div>'
        +'<span class="prog-toggle-icon">▾</span>'
      +'</div>'
      +'<div class="prog-body">'
        +'<div class="prog-desc">'+escH(p.descricao||'Sem descrição.')+'</div>'
        +'<div class="prog-valores">'
          +'<div class="valor-box"><div class="valor-lbl">À Vista</div><div class="valor-num">'+valorAvista+'</div></div>'
          +'<div class="valor-box"><div class="valor-lbl">Parcelado</div><div class="valor-num">'+valorParc+'</div></div>'
        +'</div>'
        +(sessoes.length ? '<div class="plano-title">Plano de sessões</div><div class="sessao-list-'+p.id+'">'+renderSessoes(sessoes)+'</div>' : '')
        +'<div class="prog-actions">'
          +'<button class="btn btn-ghost btn-sm" onclick="editarPrograma('+p.id+')">&#9998; Editar</button>'
          +'<button class="btn btn-sm" onclick="toggleAtivo('+p.id+')" style="background:rgba(245,158,11,.08);color:#fcd34d;border:1px solid rgba(245,158,11,.2)">'
            +(p.ativo ? '&#9675; Inativar' : '&#9674; Ativar')+'</button>'
          +(parseInt(p.vezes_recomendado)===0
            ? '<button class="btn btn-sm btn-danger" onclick="excluirPrograma('+p.id+',\''+escH(p.nome)+'\')">&#10005; Excluir</button>'
            : '')
          +'<span class="recomendado-badge">recomendado '+p.vezes_recomendado+'x</span>'
        +'</div>'
      +'</div>';

    wrap.appendChild(card);
  });
}

function renderSessoes(sessoes) {
  return sessoes.map(function(s){
    return '<div class="sessao-item">'
      +'<div class="sessao-num">S'+s.numero+'</div>'
      +'<div><div class="sessao-titulo">'+escH(s.titulo||'')+'</div><div class="sessao-desc">'+escH(s.descricao||'')+'</div></div>'
    +'</div>';
  }).join('');
}

function toggleCard(id) {
  var card = document.getElementById('prog_'+id);
  if (card) card.classList.toggle('open');
}

// ── MODAL ──
var sessoesData = [];

function abrirModal(prog) {
  editandoId = prog ? prog.id : null;
  document.getElementById('modalTitle').textContent = prog ? 'Editar Programa' : 'Novo Programa';
  document.getElementById('fNome').value    = prog ? prog.nome           : '';
  document.getElementById('fPublico').value = prog ? prog.publico_alvo   : 'adulto';
  document.getElementById('fDesc').value    = prog ? prog.descricao||''  : '';
  document.getElementById('fSessoes').value = prog ? prog.qtd_sessoes||'' : '';
  document.getElementById('fAvista').value  = prog ? prog.valor_avista||'' : '';
  // Parse parcelas
  if (prog && prog.parcelas && prog.valor_parcelado) {
    document.getElementById('fParcelado').value = prog.parcelas+'x '+parseFloat(prog.valor_parcelado).toFixed(2);
  } else {
    document.getElementById('fParcelado').value = '';
  }
  sessoesData = prog && prog.sessoes_json ? JSON.parse(JSON.stringify(prog.sessoes_json)) : [];
  renderSessoesEditor();
  document.getElementById('progModal').classList.add('open');
}

function fecharModal() {
  document.getElementById('progModal').classList.remove('open');
  editandoId = null;
  sessoesData = [];
}

function editarPrograma(id) {
  var prog = programas.find(function(p){return p.id===id;});
  if (prog) abrirModal(prog);
}

function renderSessoesEditor() {
  var wrap = document.getElementById('sessoesEditor');
  wrap.innerHTML = '';
  sessoesData.forEach(function(s, i) {
    var div = document.createElement('div');
    div.className = 'sessao-editor';
    div.innerHTML =
      '<div class="sessao-editor-hdr">'
        +'<span class="sessao-editor-num">S'+s.numero+'</span>'
        +'<input type="text" value="'+escHAttr(s.titulo||'')+'" placeholder="Título da sessão" '
          +'oninput="sessoesData['+i+'].titulo=this.value" '
          +'style="flex:1;background:rgba(11,19,43,.5);border:1px solid var(--brd);border-radius:6px;color:var(--tx);font-size:13px;padding:6px 10px;outline:none">'
        +'<button class="btn-remove-sess" onclick="removerSessao('+i+')">&#10005;</button>'
      +'</div>'
      +'<textarea placeholder="Descrição do que acontece nesta sessão..." '
        +'oninput="sessoesData['+i+'].descricao=this.value" '
        +'style="width:100%;background:rgba(11,19,43,.5);border:1px solid var(--brd);border-radius:6px;color:var(--tx);font-size:12.5px;padding:7px 10px;outline:none;resize:vertical;min-height:52px;line-height:1.5">'+escH(s.descricao||'')+'</textarea>';
    wrap.appendChild(div);
  });
}

function adicionarSessaoEditor() {
  var num = sessoesData.length + 1;
  sessoesData.push({ numero: num, titulo: '', descricao: '' });
  renderSessoesEditor();
  // Auto-fill qtd_sessoes
  document.getElementById('fSessoes').value = num;
}

function removerSessao(idx) {
  sessoesData.splice(idx, 1);
  sessoesData.forEach(function(s,i){ s.numero = i+1; });
  document.getElementById('fSessoes').value = sessoesData.length || '';
  renderSessoesEditor();
}

function salvarPrograma() {
  var nome = document.getElementById('fNome').value.trim();
  if (!nome) { showToast('Nome é obrigatório.','error'); return; }
  var parceladoStr = document.getElementById('fParcelado').value.trim();
  var parcelas=null, valor_parcelado=null;
  if (parceladoStr) {
    var m = parceladoStr.match(/^(\d+)x?\s*([\d,\.]+)/i);
    if (m) { parcelas=parseInt(m[1]); valor_parcelado=parseFloat(m[2].replace(',','.')); }
  }
  var payload = {
    nome, publico_alvo: document.getElementById('fPublico').value,
    descricao: document.getElementById('fDesc').value||null,
    qtd_sessoes: parseInt(document.getElementById('fSessoes').value)||null,
    valor_avista: parseFloat(document.getElementById('fAvista').value)||null,
    valor_parcelado, parcelas,
    sessoes_json: sessoesData
  };
  var btn = document.getElementById('btnSalvar');
  btn.disabled=true; btn.textContent='Salvando...';
  var req = editandoId
    ? api('/api/programas/'+editandoId, 'PUT', payload)
    : api('/api/programas', 'POST', payload);
  req.then(function(){
    fecharModal(); showToast(editandoId?'Programa atualizado!':'Programa criado!','success');
    carregarProgramas();
  }).catch(function(e){ showToast(e.message||'Erro.','error'); })
    .finally(function(){ btn.disabled=false; btn.textContent='Salvar Programa'; });
}

function toggleAtivo(id) {
  api('/api/programas/'+id+'/toggle','PUT',{})
    .then(function(d){ showToast(d.message,'success'); carregarProgramas(); })
    .catch(function(e){ showToast(e.message,'error'); });
}

function excluirPrograma(id, nome) {
  if (!confirm('Excluir "'+nome+'" permanentemente?')) return;
  api('/api/programas/'+id,'DELETE')
    .then(function(){ showToast('Programa excluído.','success'); carregarProgramas(); })
    .catch(function(e){ showToast(e.message,'error'); });
}

function escH(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escHAttr(s){ return escH(s).replace(/"/g,'&quot;'); }
</script>
