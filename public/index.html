<style>
  :root {
    --bg-primary:    #0B132B;
    --bg-surface:    #1C2541;
    --accent:        #D4AF7F;
    --accent-dim:    rgba(212,175,127,0.12);
    --accent-border: rgba(212,175,127,0.25);
    --text-primary:  #F5F7FA;
    --text-muted:    #C9D1D9;
    --text-dim:      rgba(201,209,217,0.45);
    --border:        rgba(201,209,217,0.1);
    --font-display:  'Satoshi', sans-serif;
    --font-body:     'Inter', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: var(--font-body);
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh; min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .neural-bg { position:fixed; inset:0; z-index:0; opacity:0.12; pointer-events:none; }
  .center { position:relative; z-index:1; text-align:center; padding:32px 24px; }
  .logo-img { width:180px; height:auto; margin-bottom:20px; }
  .tagline { font-family:var(--font-body); font-size:13px; color:var(--text-muted); letter-spacing:0.5px; margin-bottom:8px; }
  .version { font-size:11px; color:var(--text-dim); letter-spacing:1px; }
  .accent { color:var(--accent); }
  footer {
    position:fixed; bottom:0; left:0; right:0;
    text-align:center; padding:14px 16px;
    font-size:10px; color:var(--text-dim); letter-spacing:0.3px;
    border-top:1px solid var(--border);
    background:rgba(11,19,43,0.85); backdrop-filter:blur(8px);
  }
</style>
</head>
<body>
<svg class="neural-bg" viewBox="0 0 375 812" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <g stroke="#D4AF7F" stroke-width="0.5" fill="none">
    <path d="M-20,200 Q100,100 200,250 T420,180"/>
    <path d="M-20,350 Q80,280 190,380 T420,320"/>
    <path d="M-20,500 Q120,420 220,500 T420,460"/>
    <path d="M50,0 Q90,180 60,350 T100,812"/>
    <path d="M200,0 Q240,200 180,400 T220,812"/>
    <path d="M320,0 Q280,150 340,320 T300,812"/>
    <circle cx="187" cy="250" r="1.5" fill="#D4AF7F"/>
    <circle cx="280" cy="380" r="1"   fill="#D4AF7F"/>
    <circle cx="100" cy="460" r="1.5" fill="#D4AF7F"/>
    <circle cx="220" cy="180" r="1"   fill="#D4AF7F"/>
  </g>
</svg>
<div class="center">
  <img src="/img/logo-vertical.png" alt="Synapse Core" class="logo-img">
  <div class="tagline">Plataforma de Inteligência Clínica Integrativa</div>
  <div class="version">v1.0.1 <span class="accent">·</span> Em desenvolvimento</div>
</div>
<footer>
  © 2026 Synapse Core. Criado e concebido por <strong style="color:var(--text-muted)">Erick Torritezi</strong>. Todos os direitos reservados.
</footer>
</body>
