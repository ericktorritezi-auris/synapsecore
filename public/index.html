<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Synapse Core — Acesso</title>
<meta name="theme-color" content="#0B132B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Synapse Core">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0B132B;
  --surface:  #1C2541;
  --accent:   #D4AF7F;
  --acc-dim:  rgba(212,175,127,0.12);
  --acc-brd:  rgba(212,175,127,0.3);
  --text:     #F5F7FA;
  --muted:    #C9D1D9;
  --dim:      rgba(201,209,217,0.45);
  --border:   rgba(201,209,217,0.1);
  --error:    #e05c5c;
  --f-display:'Satoshi', sans-serif;
  --f-body:   'Inter', sans-serif;
  --radius:   14px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  height: 100%; height: 100dvh;
  font-family: var(--f-body);
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}
/* Neural Threads */
.neural {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none;
}
/* Layout */
.page {
  position: relative; z-index: 1;
  min-height: 100vh; min-height: 100dvh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 24px 20px 80px;
}
/* Card */
.card {
  width: 100%; max-width: 380px;
  background: rgba(28,37,65,0.65);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(212,175,127,0.18);
  border-radius: 20px;
  padding: 36px 28px 32px;
}
/* Logo */
.logo-wrap {
  text-align: center;
  margin-bottom: 28px;
}
.logo-wrap img {
  height: 42px; width: auto;
}
/* Divider */
.divider {
  height: 1px;
  background: var(--border);
  margin-bottom: 24px;
}
/* Headline */
.headline {
  font-family: var(--f-display);
  font-size: 18px; font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
}
.sub {
  font-size: 12px; color: var(--dim);
  margin-bottom: 24px;
}
/* Field */
.field { margin-bottom: 16px; }
.field label {
  display: block;
  font-size: 11px; font-weight: 500;
  color: var(--muted);
  letter-spacing: 0.8px;
  text-transform: uppercase;
  margin-bottom: 7px;
}
.field input {
  width: 100%;
  height: 48px;
  background: rgba(11,19,43,0.6);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: var(--f-body);
  font-size: 15px;
  padding: 0 14px;
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
.field input:focus { border-color: var(--acc-brd); }
.field input::placeholder { color: var(--dim); }
/* Password wrap */
.pw-wrap { position: relative; }
.pw-wrap input { padding-right: 46px; }
.pw-toggle {
  position: absolute; right: 14px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none; cursor: pointer;
  color: var(--dim); font-size: 18px; padding: 4px;
  transition: color 0.2s;
}
.pw-toggle:hover { color: var(--muted); }
/* Error */
.error-msg {
  background: rgba(224,92,92,0.12);
  border: 1px solid rgba(224,92,92,0.3);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 12.5px;
  color: var(--error);
  margin-bottom: 16px;
  display: none;
}
/* Button */
.btn-login {
  width: 100%; height: 50px;
  background: linear-gradient(135deg, #D4AF7F, #b8924e);
  border: none; border-radius: 10px;
  color: #0B132B;
  font-family: var(--f-display);
  font-size: 14px; font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: all 0.2s;
  margin-top: 8px;
}
.btn-login:hover:not(:disabled) {
  transform: translateY(-1px);
  box-shadow: 0 8px 24px rgba(212,175,127,0.25);
}
.btn-login:disabled {
  opacity: 0.65; cursor: not-allowed;
}
/* Spinner */
.spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(11,19,43,0.3);
  border-top-color: #0B132B;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }
/* Footer */
footer {
  position: fixed; bottom: 0; left: 0; right: 0;
  text-align: center;
  padding: 12px 16px;
  font-size: 10px; color: var(--dim);
  border-top: 1px solid var(--border);
  background: rgba(11,19,43,0.85);
  backdrop-filter: blur(8px);
  letter-spacing: 0.3px;
}
footer strong { color: rgba(201,209,217,0.65); }
</style>
</head>
<body>

<!-- Neural Threads Background -->
<svg class="neural" viewBox="0 0 390 844" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <g stroke="#D4AF7F" stroke-width="0.6" fill="none" opacity="0.13">
    <path d="M-30,180 Q80,80 200,220 T440,150"/>
    <path d="M-30,320 Q60,240 180,340 T440,280"/>
    <path d="M-30,460 Q100,380 210,460 T440,420"/>
    <path d="M-30,600 Q90,520 200,600 T440,560"/>
    <path d="M60,0 Q95,160 55,340 T90,844"/>
    <path d="M195,0 Q230,180 170,380 T200,844"/>
    <path d="M330,0 Q290,140 350,300 T310,844"/>
    <circle cx="200" cy="220" r="2" fill="#D4AF7F" opacity="0.5"/>
    <circle cx="290" cy="340" r="1.5" fill="#D4AF7F" opacity="0.4"/>
    <circle cx="110" cy="460" r="2" fill="#D4AF7F" opacity="0.5"/>
    <circle cx="230" cy="150" r="1.5" fill="#D4AF7F" opacity="0.4"/>
    <circle cx="160" cy="600" r="1.5" fill="#D4AF7F" opacity="0.3"/>
  </g>
</svg>

<div class="page">
  <div class="card">
    <div class="logo-wrap">
      <img src="/img/logo-horizontal.png" alt="Synapse Core">
    </div>
    <div class="divider"></div>
    <div class="headline">Acesso ao Painel</div>
    <div class="sub">Plataforma de Inteligência Clínica Integrativa</div>

    <form id="loginForm" onsubmit="handleLogin(event)" autocomplete="on" novalidate>
      <div class="field">
        <label for="loginInput">Login</label>
        <input type="text" id="loginInput" name="username"
          placeholder="Seu login de acesso"
          autocomplete="username"
          inputmode="text" spellcheck="false">
      </div>
      <div class="field">
        <label for="senhaInput">Senha</label>
        <div class="pw-wrap">
          <input type="password" id="senhaInput" name="password"
            placeholder="••••••••"
            autocomplete="current-password">
          <button type="button" class="pw-toggle" onclick="togglePW()" aria-label="Ver senha">
            <span id="pwIcon">👁</span>
          </button>
        </div>
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <button type="submit" class="btn-login" id="submitBtn">
        <div class="spinner" id="spinner"></div>
        <span id="btnText">Entrar</span>
      </button>
    </form>
  </div>
</div>

<footer>
  © 2026 Synapse Core &mdash; <strong>Erick Torritezi</strong> &mdash; <span id="loginVersion">v3.1.6</span>
</footer>

<script>
// Show version
fetch('/api/health').then(function(r){return r.json();}).then(function(d){
  var el = document.getElementById('loginVersion');
  if (el && d.version) el.textContent = 'v' + d.version;
}).catch(function(){/* keeps hardcoded fallback */});

// Redirect se já logado
(function() {
  if (localStorage.getItem('sc_token')) {
    window.location.href = '/dashboard';
  }
})();

function togglePW() {
  const input = document.getElementById('senhaInput');
  const icon  = document.getElementById('pwIcon');
  if (input.type === 'password') {
    input.type = 'text';
    icon.textContent = '🙈';
  } else {
    input.type = 'password';
    icon.textContent = '👁';
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

function setLoading(on) {
  const btn      = document.getElementById('submitBtn');
  const spinner  = document.getElementById('spinner');
  const txt      = document.getElementById('btnText');
  btn.disabled      = on;
  spinner.style.display = on ? 'block' : 'none';
  txt.textContent       = on ? 'Entrando...' : 'Entrar';
}

async function handleLogin(e) {
  e.preventDefault();
  document.getElementById('errorMsg').style.display = 'none';

  const login = document.getElementById('loginInput').value.trim();
  const senha = document.getElementById('senhaInput').value;

  if (!login || !senha) {
    showError('Preencha login e senha.');
    return;
  }

  setLoading(true);
  try {
    const res  = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ login, senha })
    });
    const data = await res.json();
    if (res.ok) {
      localStorage.setItem('sc_token',     data.token);
      localStorage.setItem('sc_terapeuta', JSON.stringify(data.terapeuta));
      window.location.href = '/dashboard';
    } else {
      setLoading(false);
      showError(data.message || 'Login inválido.');
    }
  } catch (err) {
    setLoading(false);
    showError('Erro de conexão. Tente novamente.');
  }
}
</script>
</body>
</html>
